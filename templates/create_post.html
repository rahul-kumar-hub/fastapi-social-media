{% extends "base.html" %}

{% block content %}

<div class="write-container">

    <div class="write-header">

        <a href="/feed" class="back-link">

            ← Home

        </a>

        <span id="draftStatus" class="text-success">

            Draft Saved

        </span>

    </div>

    <form id="createPostForm">
        <div class="mb-4">

            <label class="form-label fw-bold">

                Cover Image

            </label>

            <input type="file" id="coverImage" class="form-control" accept="image/*">

        </div>

        <div class="mb-3">

            <img id="coverPreview" class="img-fluid rounded shadow-sm d-none"
                style="max-height:300px;object-fit:cover;">

        </div>
        <input id="title" class="post-title" placeholder="Title" maxlength="150" required>

        <div class="text-end">

            <small class="text-muted">

                <span id="titleCount">0</span>/150

            </small>

        </div>
        <textarea id="content" class="post-content" placeholder="Tell your story..." required></textarea>

        <div class="text-end">

            <small id="charCount" class="text-muted">

                0 characters

            </small>

        </div>

        <div id="message" class="mt-4"></div>

        <div class="publish-bar">

            <button class="btn btn-success btn-lg">

                Publish Story

            </button>

        </div>

    </form>

</div>

{% endblock %}

{% block scripts %}

<script src="/static/js/create_post.js"></script>

{% endblock %}
